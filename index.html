<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BenchKit — ラボ計算ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#EDF1EF;--grid:rgba(18,58,70,.05);--card:#fff;--ink:#15272F;--soft:#5C6E78;--faint:#92A1A8;--line:#D8DFDD;--teal:#0C7C8C;--teal-d:#0A6675;--teal-l:#E2F0F1;--amber:#B5740A;--note:#FFFDF6;--rule:#EAD7CF;--margin:#D2897A;--radius:14px;--shadow:0 1px 2px rgba(20,40,48,.05),0 8px 24px -16px rgba(20,40,48,.35);--mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;--sans:'IBM Plex Sans','Hiragino Sans','Noto Sans JP','Yu Gothic',Meiryo,system-ui,sans-serif}
*{box-sizing:border-box}html,body{margin:0}body{font-family:var(--sans);color:var(--ink);line-height:1.55;background-color:var(--paper);background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:23px 23px}.wrap{max-width:1080px;margin:0 auto;padding:0 20px 64px}.topbar{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;padding:26px 0 16px;border-bottom:1px solid var(--line);margin-bottom:26px}.mark{font-family:var(--mono);font-weight:600;font-size:21px;display:flex;align-items:center;gap:9px}.mark .dot{width:11px;height:11px;border-radius:3px;background:var(--teal);box-shadow:0 0 0 3px var(--teal-l)}.mark b{color:var(--teal)}.tag-line{font-size:13px;color:var(--soft)}.spacer{flex:1}.count{font-family:var(--mono);font-size:12px;color:var(--faint)}.search{position:relative;margin-bottom:24px}.search input{width:100%;padding:13px 15px 13px 40px;font-size:15px;background:var(--card);border:1px solid var(--line);border-radius:11px;outline:none}.search input:focus,.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-l)}.mag{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--faint)}.cat{margin:30px 0 12px;display:flex;align-items:center;gap:11px}.cat:first-child{margin-top:6px}.cat .lab,.subhead{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--teal-d)}.cat .rule{flex:1;height:1px;background:var(--line)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:14px}.card{display:block;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:17px;text-decoration:none;color:inherit;transition:.15s}.card:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:var(--shadow)}.ico{display:inline-flex;align-items:center;justify-content:center;background:var(--teal-l);border-radius:9px}.card .ico{font-size:20px;width:34px;height:34px;margin-bottom:11px}.card h3{margin:0 0 4px;font-size:15.5px}.card p{margin:0;font-size:12.5px;color:var(--soft);line-height:1.45}.empty{padding:40px 0;text-align:center;color:var(--faint)}.back{display:inline-flex;gap:6px;font-family:var(--mono);font-size:13px;color:var(--teal-d);text-decoration:none;margin:4px 0 18px}.thead{display:flex;gap:14px;align-items:flex-start;margin-bottom:22px}.thead .ico{font-size:23px;width:46px;height:46px;flex:none;border-radius:12px}.thead h1{margin:0 0 3px;font-size:22px}.thead p{margin:0;font-size:14px;color:var(--soft);max-width:70ch}.cols{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}@media(max-width:720px){.cols{grid-template-columns:1fr}.thead h1{font-size:20px}}.field{display:block;margin-bottom:14px}.field .lab{display:block;font-size:13px;font-weight:500;margin-bottom:6px}.field .lab small{color:var(--faint);font-weight:400;margin-left:6px}.inwrap{display:flex;gap:8px}.field input,.field select,.field textarea{font-family:var(--mono);font-size:15px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 12px;outline:none;width:100%}.field textarea{min-height:118px;resize:vertical;line-height:1.5}.field select{cursor:pointer;flex:none;width:auto;min-width:82px;font-size:14px}.subhead{margin:20px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--line)}.readout{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 16px;box-shadow:var(--shadow)}.metric{display:flex;justify-content:space-between;align-items:baseline;gap:14px;padding:12px 0;border-bottom:1px dashed var(--line)}.metric:last-child{border-bottom:none}.m-lab{font-size:13.5px;color:var(--soft);flex:none}.m-val{font-family:var(--mono);font-size:18px;font-weight:500;text-align:right;word-break:break-word}.m-val b{color:var(--teal-d);font-weight:600}.lead .m-val{font-size:21px;color:var(--amber)}.hint{padding:22px 4px;color:var(--faint);font-size:13.5px;text-align:center;line-height:1.6}.note{position:relative;margin-top:16px;background:var(--note);border:1px solid var(--line);border-radius:11px;padding:14px 16px 16px 32px;line-height:28px;background-image:repeating-linear-gradient(transparent,transparent 27px,var(--rule) 27px,var(--rule) 28px)}.note:before{content:"";position:absolute;left:19px;top:8px;bottom:8px;width:1.5px;background:var(--margin);opacity:.7}.ey{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--margin);line-height:1}.f-gen{font-family:var(--mono);font-size:15px;font-weight:500;margin:4px 0 2px}.f-work{font-family:var(--mono);font-size:13.5px;color:var(--soft)}.f-work b{color:var(--teal-d)}.note small{display:block;font-size:12px;color:var(--faint);line-height:1.5;margin-top:6px}.warn{margin-top:10px;padding:10px 12px;border-radius:10px;background:#fff7e6;border:1px solid #efd7a2;color:#7a4b00;font-size:13px}.foot{margin-top:46px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--faint);line-height:1.7}.foot code{font-family:var(--mono);color:var(--soft)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="mark"><span class="dot"></span>Bench<b>Kit</b></span>
    <span class="tag-line">誤差まで出す・式も残る、ベンチ計算ツール</span>
    <span class="spacer"></span><span class="count" id="count"></span>
  </div>
  <div id="view"></div>
  <div class="foot">すべてブラウザ内で計算します — <code>データは送信されません</code>。 BenchKit v1.1</div>
</div>
<script>
const SUP={'-':'⁻','+':'','0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
const sup=s=>String(s).replace(/[-+0-9]/g,c=>SUP[c]);
function fmt(x,sig=4){if(x===0)return'0';if(typeof x!=='number'||!isFinite(x))return'—';const a=Math.abs(x);if(a>=1e6||a<1e-3){let[m,e]=x.toExponential(sig-1).split('e');m=m.replace(/(\.\d*?)0+$/,'$1').replace(/\.$/,'');return m+'×10'+sup(e.replace('+',''))}let s=x.toPrecision(sig);if(s.includes('.')&&!s.includes('e'))s=s.replace(/0+$/,'').replace(/\.$/,'');return s}
const num=s=>(s===''||s==null)?NaN:+s, filled=(d,k)=>d[k]!==undefined&&d[k]!==''&&!isNaN(+d[k]);
const CF={M:1,mM:1e-3,'µM':1e-6,nM:1e-9}, VF={L:1,mL:1e-3,'µL':1e-6};
const toM=(v,u)=>(+v)*(CF[u]??1), toL=(v,u)=>(+v)*(VF[u]??1), tomL=(v,u)=>(+v)*((VF[u]??1)*1000);
function volStr(mL){const a=Math.abs(mL);if(a>=1000)return fmt(mL/1000)+' L';if(a>=1)return fmt(mL)+' mL';return fmt(mL*1000)+' µL'}
function massStr(g){const a=Math.abs(g);if(a>=1)return fmt(g)+' g';if(a>=1e-3)return fmt(g*1e3)+' mg';if(a>=1e-6)return fmt(g*1e6)+' µg';return fmt(g*1e9)+' ng'}
function concStr(M){const a=Math.abs(M);if(a>=1)return fmt(M)+' M';if(a>=1e-3)return fmt(M*1e3)+' mM';if(a>=1e-6)return fmt(M*1e6)+' µM';return fmt(M*1e9)+' nM'}
function hm(min){if(!isFinite(min))return'—';const h=Math.floor(min/60),m=Math.round(min%60);return(h?h+' h ':'')+m+' min'}
function pmStr(val,err){if(!(err>0)||!isFinite(err))return fmt(val);let d=Math.floor(Math.log10(err)),dec=Math.max(0,1-d);if(dec>10)dec=10;return val.toFixed(dec)+' ± '+err.toFixed(dec)}
const T95={1:12.71,2:4.303,3:3.182,4:2.776,5:2.571,6:2.447,7:2.365,8:2.306,9:2.262,10:2.228,11:2.201,12:2.179,13:2.160,14:2.145,15:2.131,16:2.120,17:2.110,18:2.101,19:2.093,20:2.086,21:2.080,22:2.074,23:2.069,24:2.064,25:2.060,26:2.056,27:2.052,28:2.048,29:2.045,30:2.042};
const t95=df=>df<=0?NaN:(df<=30?T95[df]:1.96);
const $=(s,r=document)=>r.querySelector(s);
function escapeAttr(s){return String(s).replace(/"/g,'&quot;')}
function fieldHTML(i){const note=i.note?`<small>${i.note}</small>`:'',lab=`<span class="lab">${i.label}${note}</span>`;if(i.type==='textarea')return`<label class="field">${lab}<textarea data-key="${i.key}" placeholder="${escapeAttr(i.placeholder||'')}">${i.def??''}</textarea></label>`;if(i.type==='select')return`<label class="field">${lab}<span class="inwrap"><select data-key="${i.key}">${i.options.map(o=>`<option${o===i.def?' selected':''}>${o}</option>`).join('')}</select></span></label>`;let unit='';if(i.unitSel)unit=`<select data-ukey="${i.key}">${i.unitSel.map(u=>`<option${u===i.defUnit?' selected':''}>${u}</option>`).join('')}</select>`;else if(i.unit)unit=`<select disabled><option>${i.unit}</option></select>`;return`<label class="field">${lab}<span class="inwrap"><input type="number" step="${i.step||'any'}" inputmode="decimal" data-key="${i.key}" value="${i.def??''}" placeholder="${escapeAttr(i.placeholder||'')}">${unit}</span></label>`}
function gather(root){const d={};root.querySelectorAll('[data-key]').forEach(el=>d[el.dataset.key]=el.value.trim());root.querySelectorAll('[data-ukey]').forEach(el=>d[el.dataset.ukey+'_u']=el.value);return d}
function renderResults(out,r,hint){const read=$('.readout',out),note=$('.note',out);if(!r){read.innerHTML=`<div class="hint">${hint||'値を入力すると結果が表示されます。'}</div>`;note.style.display='none';return}read.innerHTML=r.results.map(m=>`<div class="metric${m.lead?' lead':''}"><span class="m-lab">${m.label}</span><span class="m-val">${m.value}</span></div>`).join('')+(r.warn?`<div class="warn">${r.warn}</div>`:'');if(r.formula){note.style.display='';note.innerHTML=`<div class="ey">✎ ノート用の式</div><div class="f-gen">${r.formula}</div>${r.work?`<div class="f-work">${r.work}</div>`:''}${r.foot?`<small>${r.foot}</small>`:''}`}else note.style.display='none'}
function buildDeclTool(tool){const root=document.createElement('div');root.innerHTML=`<a class="back" href="#">← ホーム</a><div class="thead"><div class="ico">${tool.icon}</div><div><h1>${tool.name}</h1><p>${tool.blurb}</p></div></div><div class="cols"><div class="pane form">${tool.inputs.map(fieldHTML).join('')}</div><div class="pane out"><div class="readout"></div><div class="note"></div></div></div>`;const form=$('.form',root),out=$('.out',root),run=()=>{try{renderResults(out,tool.compute(gather(form)),tool.hint)}catch(e){console.error(e);renderResults(out,null,'入力を確認してください。')}};form.querySelectorAll('input,select,textarea').forEach(el=>{el.addEventListener('input',run);el.addEventListener('change',run)});run();return root}
function toolShell(icon,name,blurb){const root=document.createElement('div');root.innerHTML=`<a class="back" href="#">← ホーム</a><div class="thead"><div class="ico">${icon}</div><div><h1>${name}</h1><p>${blurb}</p></div></div><div class="cols"><div class="pane form"></div><div class="pane out"><div class="readout"></div><div class="note"></div></div></div>`;return root}

const TOOLS=[
{id:'pcr',cat:'分子生物',icon:'🧪',name:'PCR/qPCR マスターミックス',blurb:'反応数・余剰率から、Master Mix・primer・waterの総量を算出。',inputs:[
{key:'n',label:'サンプル/反応数',def:'12'},{key:'extra',label:'余剰率',unit:'%',def:'10'},{key:'rxn',label:'1反応量',unit:'µL',def:'20'},{key:'template',label:'テンプレート量/反応',unit:'µL',def:'1'},{key:'mmx',label:'2× Master Mix/反応',unit:'µL',def:'10'},{key:'pf',label:'Primer F/反応',unit:'µL',def:'0.8'},{key:'pr',label:'Primer R/反応',unit:'µL',def:'0.8'}],
 compute(d){const n=num(d.n),extra=num(d.extra)||0,rxn=num(d.rxn),tpl=num(d.template)||0,mmx=num(d.mmx)||0,pf=num(d.pf)||0,pr=num(d.pr)||0;if(!(n>0&&rxn>0))return null;const r=n*(1+extra/100),water=rxn-tpl-mmx-pf-pr,master=water+mmx+pf+pr,warn=water<0?'各試薬量の合計が1反応量を超えています。設定を確認してください。':(water<1?'Waterが1 µL未満です。ピペット精度に注意してください。':null);return{results:[{label:'余剰込み反応数',value:'<b>'+fmt(r)+'</b>',lead:true},{label:'2× Master Mix',value:volStr(mmx*r/1000)},{label:'Primer F',value:volStr(pf*r/1000)},{label:'Primer R',value:volStr(pr*r/1000)},{label:'Water',value:volStr(Math.max(0,water)*r/1000)},{label:'Master mix 合計',value:'<b>'+volStr(Math.max(0,master)*r/1000)+'</b>'},{label:'各反応へ分注',value:volStr(master/1000)+' + template '+volStr(tpl/1000)}],formula:'Water = 反応量 − template − master mix − primers　総量 = 1反応量 × 反応数 × (1+余剰率)',work:`反応数 ${fmt(n)} × ${fmt(1+extra/100)} = <b>${fmt(r)}</b><br>Water/反応 = ${fmt(rxn)} − ${fmt(tpl)} − ${fmt(mmx)} − ${fmt(pf)} − ${fmt(pr)} = <b>${fmt(water)} µL</b>`,warn}}},

{id:'gel',cat:'分子生物',icon:'🧫',name:'アガロースゲル作成',blurb:'ゲル濃度と容量からアガロース質量・バッファー量・染色剤量を計算。',inputs:[
{key:'pct',label:'ゲル濃度',unit:'%',def:'1.2'},{key:'vol',label:'作成量',unit:'mL',def:'50'},{key:'stain',label:'染色剤ストック倍率',note:'任意: 10000×など',def:'10000'}],
 compute(d){const pct=num(d.pct),v=num(d.vol),st=num(d.stain);if(!(pct>0&&v>0))return null;const g=pct/100*v,stain=st>0?v*1000/st:NaN;return{results:[{label:'アガロース',value:'<b>'+massStr(g)+'</b>',lead:true},{label:'TAE/TBEなど',value:volStr(v)},{label:'染色剤',value:isFinite(stain)?volStr(stain/1000):'任意'}],formula:'アガロース(g) = 濃度(%) ⁄ 100 × 容量(mL)',work:`= ${fmt(pct)} ⁄ 100 × ${fmt(v)} = <b>${massStr(g)}</b>`,foot:'%(w/v)として計算しています。電子レンジ加熱後は冷ましてから染色剤を添加してください。'}}},

{id:'antibody',cat:'分子生物',icon:'🧴',name:'抗体・試薬希釈',blurb:'1:1000 のような希釈倍率から、原液量と希釈液量を計算。',inputs:[
{key:'den',label:'希釈倍率',note:'1:N の N',def:'1000'},{key:'vol',label:'最終量',unitSel:['mL','µL','L'],defUnit:'mL',def:'10'}],
 compute(d){const den=num(d.den),v=tomL(d.vol,d.vol_u);if(!(den>0&&v>0))return null;const stock=v/den,dil=v-stock;return{results:[{label:'原液/抗体',value:'<b>'+volStr(stock)+'</b>',lead:true},{label:'希釈液',value:volStr(dil)},{label:'最終量',value:volStr(v)},{label:'比率',value:'1:'+fmt(den)}],formula:'原液量 = 最終量 ⁄ 希釈倍率　希釈液量 = 最終量 − 原液量',work:`${volStr(v)} ⁄ ${fmt(den)} = <b>${volStr(stock)}</b>`,warn:stock<0.001?'原液量が1 µL未満です。中間希釈を作る方が安全です。':null}}},

{id:'seeding',cat:'細胞培養',icon:'🌱',name:'細胞播種計算',blurb:'細胞濃度・目標細胞数・well数から、細胞懸濁液と培地量を算出。',inputs:[
{key:'conc',label:'細胞濃度',unit:'cells/mL',def:'500000'},{key:'target',label:'播種したい細胞数',unit:'cells/well',def:'10000'},{key:'wells',label:'well数',def:'24'},{key:'vol',label:'1 wellあたり容量',unitSel:['µL','mL'],defUnit:'µL',def:'500'},{key:'extra',label:'余剰率',unit:'%',def:'10'}],
 compute(d){const c=num(d.conc),target=num(d.target),w=num(d.wells),vw=d.vol_u==='mL'?num(d.vol):num(d.vol)/1000,extra=num(d.extra)||0;if(!(c>0&&target>0&&w>0&&vw>0))return null;const wells=w*(1+extra/100),cellMl=target*wells/c,totalMl=vw*wells,medium=totalMl-cellMl;return{results:[{label:'余剰込みwell数',value:'<b>'+fmt(wells)+'</b>',lead:true},{label:'必要細胞懸濁液',value:volStr(cellMl)},{label:'加える培地',value:medium>=0?volStr(medium):'⚠ 容量不足'},{label:'合計調製量',value:volStr(totalMl)},{label:'各wellへ',value:volStr(vw)}],formula:'細胞懸濁液量 = 目標細胞数 × well数 ⁄ 細胞濃度',work:`${fmt(target)} cells/well × ${fmt(wells)} wells ⁄ ${fmt(c)} cells/mL = <b>${volStr(cellMl)}</b>`,warn:medium<0?'目標細胞数に対してwell容量が小さすぎます。濃縮するか容量を増やしてください。':(cellMl/totalMl>0.5?'細胞懸濁液の割合が高めです。培地条件の変化に注意してください。':null)}}},

{id:'copies',cat:'分子生物',icon:'🧬',name:'DNA/RNA コピー数・モル変換',blurb:'長さ・濃度からnM、pmol、copies/µL、総コピー数を計算。',inputs:[
{key:'type',type:'select',label:'種類',options:['dsDNA','ssDNA/RNA']},{key:'len',label:'長さ',unit:'nt/bp',def:'1000'},{key:'conc',label:'濃度',unit:'ng/µL',def:'10'},{key:'vol',label:'容量',unit:'µL',def:'10'}],
 compute(d){const len=num(d.len),ngul=num(d.conc),vol=num(d.vol)||1;if(!(len>0&&ngul>0))return null;const dalton=(d.type==='dsDNA'?660:330)*len;const gL=ngul*1e-3, molL=gL/dalton, nM=molL*1e9, copiesUL=ngul*1e-9/dalton*6.02214076e23,total=copiesUL*vol;return{results:[{label:'モル濃度',value:'<b>'+fmt(nM)+' nM</b>',lead:true},{label:'copies/µL',value:fmt(copiesUL,4)},{label:'総コピー数',value:fmt(total,4)},{label:'分子量近似',value:fmt(dalton)+' g/mol'}],formula:'mol/L = (ng/µL × 10⁻³ g/L) ⁄ 分子量　copies = mol × Nᴀ',work:`MW ≈ ${d.type==='dsDNA'?660:330} × ${fmt(len)} = ${fmt(dalton)} g/mol<br>${fmt(ngul)} ng/µL → <b>${fmt(nM)} nM</b>`,foot:'分子量は dsDNA=660 Da/bp、ssDNA/RNA=330 Da/nt の近似です。'}}},

{id:'ligation',cat:'分子生物',icon:'🔗',name:'ライゲーション/Gibson 比率',blurb:'ベクター量・長さ・インサート長・モル比から、インサート量ngを計算。',inputs:[
{key:'vlen',label:'ベクター長',unit:'bp',def:'3000'},{key:'ilen',label:'インサート長',unit:'bp',def:'1000'},{key:'vng',label:'ベクター量',unit:'ng',def:'50'},{key:'ratio',label:'インサート比',note:'vector:insert = 1:N',def:'3'}],
 compute(d){const vlen=num(d.vlen),ilen=num(d.ilen),vng=num(d.vng),r=num(d.ratio);if(!(vlen>0&&ilen>0&&vng>0&&r>0))return null;const ing=vng*ilen/vlen*r;return{results:[{label:'必要インサート量',value:'<b>'+fmt(ing)+' ng</b>',lead:true},{label:'ベクター量',value:fmt(vng)+' ng'},{label:'モル比',value:'1:'+fmt(r)}],formula:'insert ng = vector ng × insert bp ⁄ vector bp × モル比',work:`${fmt(vng)} × ${fmt(ilen)} ⁄ ${fmt(vlen)} × ${fmt(r)} = <b>${fmt(ing)} ng</b>`}}},

{id:'dilution',cat:'溶液調製',icon:'💧',name:'希釈 (C₁V₁=C₂V₂)',blurb:'4つの値のうち3つを入力すると、残り1つを計算。',hint:'C₁・V₁・C₂・V₂ のうち3つを入力してください。',inputs:[
{key:'c1',label:'ストック濃度 C₁',unitSel:['M','mM','µM','nM'],defUnit:'M'},{key:'v1',label:'ストック量 V₁',unitSel:['mL','µL','L'],defUnit:'µL'},{key:'c2',label:'最終濃度 C₂',unitSel:['M','mM','µM','nM'],defUnit:'mM'},{key:'v2',label:'最終容量 V₂',unitSel:['mL','µL','L'],defUnit:'mL'}],
 compute(d){const e=['c1','v1','c2','v2'].filter(k=>!filled(d,k));if(e.length!==1)return null;const C1=filled(d,'c1')?toM(d.c1,d.c1_u):null,C2=filled(d,'c2')?toM(d.c2,d.c2_u):null,V1=filled(d,'v1')?tomL(d.v1,d.v1_u):null,V2=filled(d,'v2')?tomL(d.v2,d.v2_u):null;let label,x;if(e[0]==='v1'){x=C2*V2/C1;label='必要なストック量 V₁'}else if(e[0]==='v2'){x=C1*V1/C2;label='最終容量 V₂'}else if(e[0]==='c1'){x=C2*V2/V1;label='ストック濃度 C₁'}else{x=C1*V1/V2;label='最終濃度 C₂'}if(!isFinite(x)||x<=0)return null;return{results:[{label,value:'<b>'+(e[0][0]==='c'?concStr(x):volStr(x))+'</b>',lead:true}],formula:'C₁V₁ = C₂V₂',work:`空欄を C₁V₁=C₂V₂ より算出 → <b>${e[0][0]==='c'?concStr(x):volStr(x)}</b>`,warn:e[0]==='v1'&&x<0.001?'必要量が1 µL未満です。中間希釈を検討してください。':null}}},

{id:'molar',cat:'溶液調製',icon:'⚖️',name:'モル濃度 → 秤量',blurb:'分子量・目的濃度・調製容量から必要な粉末量を計算。',inputs:[
{key:'mw',label:'分子量 (MW)',unit:'g/mol',placeholder:'例: 58.44'},{key:'c',label:'目的濃度',unitSel:['M','mM','µM','nM'],defUnit:'mM'},{key:'v',label:'調製容量',unitSel:['mL','L','µL'],defUnit:'mL'}],
 compute(d){const mw=num(d.mw),M=toM(d.c,d.c_u),L=toL(d.v,d.v_u);if(!(mw>0&&M>0&&L>0))return null;const mol=M*L,g=mol*mw;return{results:[{label:'必要質量',value:'<b>'+massStr(g)+'</b>',lead:true},{label:'物質量',value:fmt(mol*1e3)+' mmol'}],formula:'質量 = 分子量 × 濃度 × 容量',work:`${fmt(mw)} g/mol × ${concStr(M)} × ${volStr(L*1000)} = <b>${massStr(g)}</b>`}}},

{id:'stats',cat:'統計・誤差',icon:'📊',name:'基礎統計・誤差',blurb:'データ列から平均・標準偏差・標準誤差・95%信頼区間を算出。',inputs:[{key:'data',type:'textarea',label:'データ',note:'改行・カンマ・空白区切り',placeholder:'12.3\n12.5\n11.9\n12.4'}],
 compute(d){const xs=(d.data||'').split(/[\s,]+/).map(Number).filter(v=>!isNaN(v)),n=xs.length;if(!n)return null;const sum=xs.reduce((a,b)=>a+b,0),mean=sum/n,ss=xs.reduce((a,b)=>a+(b-mean)**2,0),sd=n>1?Math.sqrt(ss/(n-1)):0,se=n>1?sd/Math.sqrt(n):0,s=[...xs].sort((a,b)=>a-b),med=n%2?s[(n-1)/2]:(s[n/2-1]+s[n/2])/2,ci=t95(n-1)*se;return{results:[{label:'平均 x̄',value:'<b>'+fmt(mean)+'</b>',lead:true},{label:'標準偏差 s',value:fmt(sd)},{label:'標準誤差 SE',value:fmt(se)},{label:'95% 信頼区間',value:n>1?pmStr(mean,ci):'—'},{label:'CV',value:mean!==0?fmt(sd/Math.abs(mean)*100)+' %':'—'},{label:'中央値',value:fmt(med)},{label:'n',value:String(n)}],formula:'x̄ = Σxᵢ ⁄ n　s = √( Σ(xᵢ−x̄)² ⁄ (n−1) )',work:`x̄ = ${fmt(sum)} ⁄ ${n} = <b>${fmt(mean)}</b><br>SE = ${fmt(sd)} ⁄ √${n} = <b>${fmt(se)}</b>`}}},

{id:'nucleic',cat:'核酸・機器',icon:'🧬',name:'核酸濃度 (A260)',blurb:'A260と希釈倍率から核酸濃度を算出。',inputs:[
{key:'a260',label:'A260',placeholder:'例: 0.42'},{key:'dil',label:'希釈倍率',def:'1'},{key:'type',type:'select',label:'核酸の種類',options:['dsDNA (×50)','ssDNA (×33)','RNA (×40)','ssRNA oligo (×33)']},{key:'a280',label:'A280',note:'任意・純度用'},{key:'a230',label:'A230',note:'任意・純度用'}],
 compute(d){const a=num(d.a260),dil=num(d.dil)||1;if(!(a>0))return null;const fac=d.type.includes('50')?50:d.type.includes('40')?40:33,conc=a*dil*fac,res=[{label:'濃度',value:'<b>'+fmt(conc)+' ng/µL</b>',lead:true},{label:'濃度 (µg/mL)',value:fmt(conc)+' µg/mL'}],a280=num(d.a280),a230=num(d.a230);if(a280>0)res.push({label:'A260/A280',value:fmt(a/a280,3)});if(a230>0)res.push({label:'A260/A230',value:fmt(a/a230,3)});return{results:res,formula:'濃度 = A260 × 希釈倍率 × 係数',work:`${fmt(a)} × ${fmt(dil)} × ${fac} = <b>${fmt(conc)} ng/µL</b>`,foot:'係数: dsDNA=50, RNA=40, ssDNA/oligo=33。'}}},

{id:'rcf',cat:'核酸・機器',icon:'⚙️',name:'遠心 rpm ⇄ ×g',blurb:'ローター半径をもとにrpmとRCFを相互変換。',inputs:[
{key:'dir',type:'select',label:'計算方向',options:['rpm → ×g','×g → rpm']},{key:'r',label:'ローター半径',unit:'mm',placeholder:'例: 85'},{key:'val',label:'入力値',note:'rpm または ×g'}],
 compute(d){const rmm=num(d.r),v=num(d.val);if(!(rmm>0&&v>0))return null;const r=rmm/10,k=1.118e-5;if(d.dir==='×g → rpm'){const rpm=Math.sqrt(v/(k*r));return{results:[{label:'回転数',value:'<b>'+fmt(rpm,5)+' rpm</b>',lead:true}],formula:'rpm = √( RCF ⁄ (1.118×10⁻⁵ × r) )',work:`= <b>${fmt(rpm,5)} rpm</b>`}}const g=k*r*v*v;return{results:[{label:'相対遠心力 RCF',value:'<b>'+fmt(g,5)+' ×g</b>',lead:true}],formula:'RCF = 1.118×10⁻⁵ × r(cm) × rpm²',work:`= <b>${fmt(g,5)} ×g</b>`}}},

{id:'od',cat:'細胞培養',icon:'🧫',name:'OD・培養時間',blurb:'ブランク補正後の真のOD、倍増期から目的ODまでの時間を計算。',inputs:[
{key:'odm',label:'測定OD',placeholder:'例: 0.65'},{key:'bg',label:'バックグラウンド',def:'0'},{key:'td',label:'倍増期',unitSel:['min','h'],defUnit:'min',placeholder:'例: 25'},{key:'odt',label:'目的OD',placeholder:'例: 1.0'}],
 compute(d){const odm=num(d.odm),bg=num(d.bg)||0,td=(d.td_u==='h'?num(d.td)*60:num(d.td)),odt=num(d.odt);if(!isFinite(odm))return null;const od=odm-bg,res=[{label:'真のOD',value:'<b>'+fmt(od)+'</b>',lead:true}];let work=`真のOD = ${fmt(odm)} − ${fmt(bg)} = <b>${fmt(od)}</b>`;if(od>0&&td>0&&odt>od){const t=td*Math.log2(odt/od);res.push({label:'目的ODまでの時間',value:'<b>'+hm(t)+'</b>'});work+=`<br>t = ${fmt(td)}min × log₂(${fmt(odt)} ⁄ ${fmt(od)}) = <b>${hm(t)}</b>`}return{results:res,formula:'真のOD = 測定OD − BG　t = 倍増期 × log₂(目的OD ⁄ 真のOD)',work,warn:od>1?'ODが高めです。測定の線形範囲外なら希釈測定を検討してください。':null}}}
];

document.getElementById('count').textContent=TOOLS.length+' tools';
const view=document.getElementById('view');
function renderHome(){view.innerHTML=`<div class="search"><span class="mag">⌕</span><input id="q" type="search" placeholder="計算機を検索 (例: PCR / 希釈 / OD / 細胞播種)" autocomplete="off"></div><div id="grid"></div>`;const grid=$('#grid',view),q=$('#q',view);function fill(filter){const f=(filter||'').trim().toLowerCase(),hit=TOOLS.filter(t=>!f||(t.name+t.blurb+t.cat).toLowerCase().includes(f));if(!hit.length){grid.innerHTML='<div class="empty">該当する計算機がありません。</div>';return}const cats=[...new Set(hit.map(t=>t.cat))];grid.innerHTML=cats.map(c=>`<div class="cat"><span class="lab">${c}</span><span class="rule"></span></div><div class="grid">${hit.filter(t=>t.cat===c).map(t=>`<a class="card" href="#${t.id}"><span class="ico">${t.icon}</span><h3>${t.name}</h3><p>${t.blurb}</p></a>`).join('')}</div>`).join('')}q.addEventListener('input',()=>fill(q.value));fill('')}
function route(){const id=decodeURIComponent(location.hash.replace(/^#\/?/,''));window.scrollTo(0,0);const tool=TOOLS.find(t=>t.id===id);if(tool){view.innerHTML='';view.appendChild(tool.custom?tool.custom():buildDeclTool(tool))}else renderHome()}
window.addEventListener('hashchange',route);route();
</script>
</body>
</html>
