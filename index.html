<style>
:root{--paper:#EDF1EF;--grid:rgba(18,58,70,.05);--card:#fff;--ink:#15272F;--ink-soft:#5C6E78;--ink-faint:#92A1A8;--line:#D8DFDD;--line-2:#C6CFCD;--teal:#0C7C8C;--teal-d:#0A6675;--teal-l:#E2F0F1;--amber:#B5740A;--note-bg:#FFFDF6;--note-rule:#EAD7CF;--note-margin:#D2897A;--radius:14px;--shadow:0 1px 2px rgba(20,40,48,.05),0 8px 24px -16px rgba(20,40,48,.35);--mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;--sans:'IBM Plex Sans','Hiragino Sans','Noto Sans JP','Yu Gothic',Meiryo,system-ui,sans-serif}*{box-sizing:border-box}html,body{margin:0}body{font-family:var(--sans);color:var(--ink);line-height:1.55;background-color:var(--paper);background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:23px 23px;-webkit-font-smoothing:antialiased}.wrap{max-width:1020px;margin:0 auto;padding:0 20px 64px}.topbar{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;padding:26px 0 16px;border-bottom:1px solid var(--line);margin-bottom:26px}.mark{font-family:var(--mono);font-weight:600;font-size:21px;letter-spacing:-.01em;color:var(--ink);display:flex;align-items:center;gap:9px}.mark .dot{width:11px;height:11px;border-radius:3px;background:var(--teal);box-shadow:0 0 0 3px var(--teal-l)}.mark b{color:var(--teal)}.tag-line{font-size:13px;color:var(--ink-soft)}.topbar .spacer{flex:1}.count{font-family:var(--mono);font-size:12px;color:var(--ink-faint)}.search{position:relative;margin-bottom:24px}.search input{width:100%;padding:13px 15px 13px 40px;font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:11px;outline:none}.search input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-l)}.mag{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:15px}.cat{margin:30px 0 12px;display:flex;align-items:center;gap:11px}.cat:first-child{margin-top:6px}.cat .lab,.subhead{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--teal-d)}.cat .rule{flex:1;height:1px;background:var(--line)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:14px}.card{display:block;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:17px 17px 16px;text-decoration:none;color:inherit;transition:border-color .15s,transform .15s,box-shadow .15s}.card:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:var(--shadow)}.card .ico,.thead .ico{display:inline-flex;align-items:center;justify-content:center;background:var(--teal-l);border-radius:9px}.card .ico{font-size:20px;width:34px;height:34px;margin-bottom:11px}.card h3{margin:0 0 4px;font-size:15.5px;font-weight:600}.card p{margin:0;font-size:12.5px;color:var(--ink-soft);line-height:1.45}.empty{padding:40px 0;text-align:center;color:var(--ink-faint);font-size:14px}.back{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:13px;color:var(--teal-d);text-decoration:none;margin:4px 0 18px}.thead{display:flex;gap:14px;align-items:flex-start;margin-bottom:22px}.thead .ico{font-size:23px;width:46px;height:46px;flex:none;border-radius:12px}.thead h1{margin:0 0 3px;font-size:22px;font-weight:700;letter-spacing:-.01em}.thead p{margin:0;font-size:14px;color:var(--ink-soft);max-width:62ch}.cols{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}@media(max-width:720px){.cols{grid-template-columns:1fr}.thead h1{font-size:20px}}.field{display:block;margin-bottom:14px}.field .lab{display:block;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:6px}.field .lab small{color:var(--ink-faint);font-weight:400;margin-left:6px}.inwrap{display:flex;gap:8px}.field input,.field select,.field textarea,.row input,.row select{font-family:var(--mono);font-size:15px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 12px;outline:none;width:100%}.field textarea{min-height:118px;resize:vertical;line-height:1.5}.field select{cursor:pointer;flex:none;width:auto;min-width:78px;font-size:14px}.field input:focus,.field select:focus,.field textarea:focus,.row input:focus,.row select:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-l)}.subhead{margin:20px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--line)}.subhead:first-child{margin-top:0}.readout{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 16px;box-shadow:var(--shadow)}.metric{display:flex;justify-content:space-between;align-items:baseline;gap:14px;padding:12px 0;border-bottom:1px dashed var(--line)}.metric:last-child{border-bottom:none}.metric .m-lab{font-size:13.5px;color:var(--ink-soft);flex:none}.metric .m-val{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--ink);text-align:right;word-break:break-word}.metric .m-val b{color:var(--teal-d);font-weight:600}.metric.lead .m-val{font-size:21px;color:var(--amber)}.hint{padding:22px 4px;color:var(--ink-faint);font-size:13.5px;text-align:center;line-height:1.6}.note{position:relative;margin-top:16px;background:var(--note-bg);border:1px solid var(--line);border-radius:11px;padding:14px 16px 16px 32px;line-height:28px;background-image:repeating-linear-gradient(transparent,transparent 27px,var(--note-rule) 27px,var(--note-rule) 28px)}.note:before{content:"";position:absolute;left:19px;top:8px;bottom:8px;width:1.5px;background:var(--note-margin);opacity:.7}.note .ey{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--note-margin);line-height:1;padding-top:2px}.note .f-gen{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--ink);margin:4px 0 2px}.note .f-work{font-family:var(--mono);font-size:13.5px;color:var(--ink-soft)}.note .f-work b{color:var(--teal-d)}.note small{display:block;font-size:12px;color:var(--ink-faint);line-height:1.5;margin-top:6px}.btn{font-family:var(--sans);font-size:13.5px;font-weight:500;color:var(--teal-d);background:var(--teal-l);border:1px solid transparent;border-radius:9px;padding:9px 14px;cursor:pointer}.btn:hover{background:#D4E9EA}.btn.x{padding:6px 9px;font-size:13px;color:var(--ink-faint);background:transparent}.seg{display:inline-flex;background:var(--teal-l);border-radius:9px;padding:3px;margin-bottom:16px}.seg button{font-family:var(--sans);font-size:13.5px;border:none;background:transparent;color:var(--teal-d);padding:7px 16px;border-radius:7px;cursor:pointer}.seg button.on{background:var(--card);color:var(--ink);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.08)}.rows{display:flex;flex-direction:column;gap:9px;margin:4px 0 12px}.row{display:grid;gap:8px;align-items:center}.row input,.row select{font-size:14px;padding:9px 10px;border-radius:8px}.row .amt{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--teal-d);text-align:right;padding-right:2px}.dtable{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:13.5px;margin-top:8px}.dtable th{font-family:var(--sans);font-size:12px;color:var(--ink-soft);font-weight:500;text-align:right;padding:7px 10px;border-bottom:1px solid var(--line-2)}.dtable th:first-child,.dtable td:first-child{text-align:left}.dtable td{padding:8px 10px;border-bottom:1px dashed var(--line);text-align:right;color:var(--ink)}.foot{margin-top:46px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-faint);line-height:1.7}.foot code{font-family:var(--mono);color:var(--ink-soft)}
</style>

<div class="wrap"><div class="topbar"><span class="mark"><span class="dot"></span>Bench<b>Kit</b></span><span class="tag-line">誤差まで出す・式も残る、ベンチ計算ツール</span><span class="spacer"></span><span class="count" id="count"></span></div><div id="view"></div><div class="foot">すべてブラウザ内で計算します — <code>データは送信されません</code>。<br>計算機の追加方法は <code>index.html</code> 内の <code>TOOLS</code> 配列を参照してください。 BenchKit v1.0</div></div>
<script>
const SUP={'-':'⁻','+':'','0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
const sup=s=>String(s).replace(/[-+0-9]/g,c=>SUP[c]);
function fmt(x,sig=4){if(x===0)return'0';if(typeof x!=='number'||!isFinite(x))return'—';const a=Math.abs(x);if(a>=1e6||a<1e-3){let[m,e]=x.toExponential(sig-1).split('e');m=m.replace(/(\.\d*?)0+$/,'$1').replace(/\.$/,'');return m+'×10'+sup(e.replace('+',''))}let s=x.toPrecision(sig);if(s.includes('.')&&!s.includes('e'))s=s.replace(/0+$/,'').replace(/\.$/,'');return s}
function massStr(g){const a=Math.abs(g);if(a>=1)return fmt(g)+' g';if(a>=1e-3)return fmt(g*1e3)+' mg';if(a>=1e-6)return fmt(g*1e6)+' µg';return fmt(g*1e9)+' ng'}
function volStr(mL){const a=Math.abs(mL);if(a>=1000)return fmt(mL/1000)+' L';if(a>=1)return fmt(mL)+' mL';return fmt(mL*1000)+' µL'}
function concStr(M){const a=Math.abs(M);if(a>=1)return fmt(M)+' M';if(a>=1e-3)return fmt(M*1e3)+' mM';if(a>=1e-6)return fmt(M*1e6)+' µM';return fmt(M*1e9)+' nM'}
const CF={M:1,mM:1e-3,'µM':1e-6,nM:1e-9},VF={L:1,mL:1e-3,'µL':1e-6};
const toM=(v,u)=>(+v)*(CF[u]??1),toL=(v,u)=>(+v)*(VF[u]??1),tomL=(v,u)=>(+v)*((VF[u]??1)*1000),num=s=>(s===''||s==null)?NaN:+s,filled=(d,k)=>d[k]!==undefined&&d[k]!==''&&!isNaN(+d[k]);
function hm(min){if(!isFinite(min))return'—';const neg=min<0;min=Math.abs(min);const h=Math.floor(min/60),m=Math.round(min%60);return(neg?'−':'')+(h?h+' h ':'')+m+' min'}
const T95={1:12.71,2:4.303,3:3.182,4:2.776,5:2.571,6:2.447,7:2.365,8:2.306,9:2.262,10:2.228,11:2.201,12:2.179,13:2.160,14:2.145,15:2.131,16:2.120,17:2.110,18:2.101,19:2.093,20:2.086,21:2.080,22:2.074,23:2.069,24:2.064,25:2.060,26:2.056,27:2.052,28:2.048,29:2.045,30:2.042};
const t95=df=>df<=0?NaN:(df<=30?T95[df]:1.96);
function pmStr(val,err){if(!(err>0)||!isFinite(err))return fmt(val);let d=Math.floor(Math.log10(err)),dec=Math.max(0,1-d);if(dec>10)dec=10;return val.toFixed(dec)+' ± '+err.toFixed(dec)}
const $=(sel,root=document)=>root.querySelector(sel);
function escapeAttr(s){return String(s).replace(/"/g,'&quot;')}
function fieldHTML(inp){const note=inp.note?`<small>${inp.note}</small>`:'',lab=`<span class="lab">${inp.label}${note}</span>`;if(inp.type==='textarea')return`<label class="field">${lab}<textarea data-key="${inp.key}" placeholder="${escapeAttr(inp.placeholder||'')}"></textarea></label>`;if(inp.type==='select')return`<label class="field">${lab}<span class="inwrap"><select data-key="${inp.key}">${inp.options.map(o=>`<option>${o}</option>`).join('')}</select></span></label>`;let unit='';if(inp.unitSel)unit=`<select data-ukey="${inp.key}">${inp.unitSel.map(u=>`<option${u===inp.defUnit?' selected':''}>${u}</option>`).join('')}</select>`;else if(inp.unit)unit=`<select disabled style="opacity:.85"><option>${inp.unit}</option></select>`;return`<label class="field">${lab}<span class="inwrap"><input type="number" step="${inp.step||'any'}" inputmode="decimal" data-key="${inp.key}" value="${inp.def??''}" placeholder="${escapeAttr(inp.placeholder||'')}">${unit}</span></label>`}
function gather(root){const d={};root.querySelectorAll('[data-key]').forEach(el=>d[el.dataset.key]=el.value.trim());root.querySelectorAll('[data-ukey]').forEach(el=>d[el.dataset.ukey+'_u']=el.value);return d}
function renderResults(outRoot,r,hint){const read=$('.readout',outRoot),note=$('.note',outRoot);if(!r){read.innerHTML=`<div class="hint">${hint||'値を入力すると結果が表示されます。'}</div>`;note.style.display='none';return}read.innerHTML=r.results.map(m=>`<div class="metric${m.lead?' lead':''}"><span class="m-lab">${m.label}</span><span class="m-val">${m.value}</span></div>`).join('');if(r.formula){note.style.display='';note.innerHTML=`<div class="ey">✎ ノート用の式</div><div class="f-gen">${r.formula}</div>${r.work?`<div class="f-work">${r.work}</div>`:''}${r.foot?`<small>${r.foot}</small>`:''}`}else note.style.display='none'}
function buildDeclTool(tool){const root=document.createElement('div');root.innerHTML=`<a class="back" href="#">← ホーム</a><div class="thead"><div class="ico">${tool.icon}</div><div><h1>${tool.name}</h1><p>${tool.blurb}</p></div></div><div class="cols"><div class="pane form">${tool.inputs.map(fieldHTML).join('')}</div><div class="pane out"><div class="readout"></div><div class="note"></div></div></div>`;const form=$('.form',root),out=$('.out',root);const run=()=>{try{renderResults(out,tool.compute(gather(form)),tool.hint)}catch(e){console.error(e);renderResults(out,null,'入力を確認してください。')}};form.querySelectorAll('input,select,textarea').forEach(el=>{el.addEventListener('input',run);el.addEventListener('change',run)});run();return root}
function toolShell(icon,name,blurb){const root=document.createElement('div');root.innerHTML=`<a class="back" href="#">← ホーム</a><div class="thead"><div class="ico">${icon}</div><div><h1>${name}</h1><p>${blurb}</p></div></div><div class="cols"><div class="pane form"></div><div class="pane out"><div class="readout"></div><div class="note"></div></div></div>`;return root}
const TOOLS=[{id:'stats',cat:'統計・誤差',icon:'📊',name:'基礎統計・誤差',blurb:'データ列から平均・標準偏差・標準誤差・95%信頼区間を算出。',inputs:[{key:'data',type:'textarea',label:'データ',note:'改行・カンマ・空白区切り',placeholder:'12.3\n12.5\n11.9\n12.4'}],compute(d){const xs=(d.data||'').split(/[\s,]+/).map(Number).filter(v=>!isNaN(v));const n=xs.length;if(n<1)return null;const sum=xs.reduce((a,b)=>a+b,0),mean=sum/n,ss=xs.reduce((a,b)=>a+(b-mean)**2,0),sd=n>1?Math.sqrt(ss/(n-1)):0,se=n>1?sd/Math.sqrt(n):0,sorted=[...xs].sort((a,b)=>a-b),med=n%2?sorted[(n-1)/2]:(sorted[n/2-1]+sorted[n/2])/2,t=t95(n-1),ci=t*se;return{results:[{label:'平均 x̄',value:'<b>'+fmt(mean)+'</b>',lead:true},{label:'標準偏差 s',value:fmt(sd)},{label:'標準誤差 SE',value:fmt(se)},{label:'95% 信頼区間',value:n>1?pmStr(mean,ci):'—'},{label:'変動係数 CV',value:mean!==0?fmt(sd/Math.abs(mean)*100)+' %':'—'},{label:'中央値',value:fmt(med)},{label:'最小 / 最大',value:fmt(sorted[0])+' / '+fmt(sorted[n-1])},{label:'データ数 n',value:String(n)}],formula:'x̄ = Σxᵢ ⁄ n　s = √( Σ(xᵢ−x̄)² ⁄ (n−1) )　SE = s ⁄ √n',work:`x̄ = ${fmt(sum)} ⁄ ${n} = <b>${fmt(mean)}</b><br>SE = ${fmt(sd)} ⁄ √${n} = <b>${fmt(se)}</b>${n>1?`<br>95%CI = x̄ ± ${fmt(t,4)}·SE = <b>${pmStr(mean,ci)}</b>`:''}`,foot:n>30?'n>30 のため信頼区間は z=1.96 で近似しています。':null}}},{id:'errprop',cat:'統計・誤差',icon:'±',name:'誤差伝播',blurb:'和・差・積・商における測定値の不確かさを合成。',custom:()=>buildErrProp()},{id:'od',cat:'培養・OD',icon:'🧫',name:'OD・培養・試薬添加',blurb:'真のOD、到達時間、試薬添加量を計算。',custom:()=>buildOD()},{id:'recipe',cat:'溶液調製',icon:'⚗️',name:'溶液調製レシピ',blurb:'ストック希釈/粉末秤量とメスアップ量を算出。',custom:()=>buildRecipe()},{id:'dilution',cat:'溶液調製',icon:'💧',name:'希釈 (C₁V₁=C₂V₂)',blurb:'4つの値のうち3つから残り1つを計算。',hint:'C₁・V₁・C₂・V₂ のうち3つを入力してください。',inputs:[{key:'c1',label:'ストック濃度 C₁',unitSel:['M','mM','µM','nM'],defUnit:'M'},{key:'v1',label:'ストック量 V₁',unitSel:['mL','µL','L'],defUnit:'µL'},{key:'c2',label:'最終濃度 C₂',unitSel:['M','mM','µM','nM'],defUnit:'mM'},{key:'v2',label:'最終容量 V₂',unitSel:['mL','µL','L'],defUnit:'mL'}],compute(d){const e=['c1','v1','c2','v2'].filter(k=>!filled(d,k));if(e.length!==1)return null;const C1=filled(d,'c1')?toM(d.c1,d.c1_u):null,C2=filled(d,'c2')?toM(d.c2,d.c2_u):null,V1=filled(d,'v1')?tomL(d.v1,d.v1_u):null,V2=filled(d,'v2')?tomL(d.v2,d.v2_u):null;let label,value,x;if(e[0]==='v1'){x=C2*V2/C1;label='必要なストック量 V₁';value='<b>'+volStr(x)+'</b>'}else if(e[0]==='v2'){x=C1*V1/C2;label='最終容量 V₂';value='<b>'+volStr(x)+'</b>'}else if(e[0]==='c1'){x=C2*V2/V1;label='ストック濃度 C₁';value='<b>'+concStr(x)+'</b>'}else{x=C1*V1/V2;label='最終濃度 C₂';value='<b>'+concStr(x)+'</b>'}if(!isFinite(x)||x<=0)return null;return{results:[{label,value,lead:true}],formula:'C₁V₁ = C₂V₂',work:`空欄を C₁V₁=C₂V₂ より算出 → <b>${e[0][0]==='c'?concStr(x):volStr(x)}</b>`}}},{id:'molar',cat:'溶液調製',icon:'⚖️',name:'モル濃度 → 秤量',blurb:'分子量・目的濃度・調製容量から必要質量を計算。',inputs:[{key:'mw',label:'分子量 (MW)',unit:'g/mol',placeholder:'例: 58.44'},{key:'c',label:'目的濃度',unitSel:['M','mM','µM','nM'],defUnit:'mM'},{key:'v',label:'調製容量',unitSel:['mL','L','µL'],defUnit:'mL'}],compute(d){const mw=num(d.mw),M=toM(d.c,d.c_u),L=toL(d.v,d.v_u);if(!(mw>0&&M>0&&L>0))return null;const mol=M*L,g=mol*mw;return{results:[{label:'必要質量',value:'<b>'+massStr(g)+'</b>',lead:true},{label:'物質量',value:fmt(mol*1e3)+' mmol'}],formula:'質量 = 分子量 × 濃度 × 容量',work:`= ${fmt(mw)} g/mol × ${concStr(M)} × ${volStr(L*1000)}<br>= <b>${massStr(g)}</b>`}}},{id:'serial',cat:'溶液調製',icon:'🌀',name:'連続希釈',blurb:'各管の濃度と分注量・希釈液量の表を作成。',custom:()=>buildSerial()},{id:'nucleic',cat:'核酸・機器',icon:'🧬',name:'核酸濃度 (A260)',blurb:'A260と希釈倍率から核酸濃度を算出。',inputs:[{key:'a260',label:'A260',placeholder:'例: 0.42'},{key:'dil',label:'希釈倍率',def:'1',placeholder:'例: 50'},{key:'type',type:'select',label:'核酸の種類',options:['dsDNA (×50)','ssDNA (×33)','RNA (×40)','ssRNA oligo (×33)']},{key:'a280',label:'A280',note:'任意・純度用',placeholder:'例: 0.22'},{key:'a230',label:'A230',note:'任意・純度用',placeholder:'例: 0.18'}],compute(d){const a=num(d.a260),dil=num(d.dil)||1;if(!(a>0))return null;const fac=d.type&&d.type.includes('50')?50:d.type&&d.type.includes('40')?40:33,conc=a*dil*fac,res=[{label:'濃度',value:'<b>'+fmt(conc)+' ng/µL</b>',lead:true},{label:'濃度 (µg/mL)',value:fmt(conc)+' µg/mL'}],a280=num(d.a280),a230=num(d.a230);if(a280>0)res.push({label:'A260/A280',value:fmt(a/a280,3)+(a/a280>=1.8?'　✓':'')});if(a230>0)res.push({label:'A260/A230',value:fmt(a/a230,3)});return{results:res,formula:'濃度 = A260 × 希釈倍率 × 係数',work:`= ${fmt(a)} × ${fmt(dil)} × ${fac} = <b>${fmt(conc)} ng/µL</b>`,foot:'係数: dsDNA=50, RNA=40, ssDNA/oligo=33。'}}},{id:'rcf',cat:'核酸・機器',icon:'⚙️',name:'遠心 rpm ⇄ ×g',blurb:'ローター半径からrpmとRCFを相互変換。',inputs:[{key:'dir',type:'select',label:'計算方向',options:['rpm → ×g','×g → rpm']},{key:'r',label:'ローター半径',unit:'mm',placeholder:'例: 85'},{key:'val',label:'入力値',note:'rpm または ×g',placeholder:'例: 14000'}],compute(d){const rmm=num(d.r),v=num(d.val);if(!(rmm>0&&v>0))return null;const r=rmm/10,k=1.118e-5;if(d.dir==='×g → rpm'){const rpm=Math.sqrt(v/(k*r));return{results:[{label:'回転数',value:'<b>'+fmt(rpm,5)+' rpm</b>',lead:true}],formula:'rpm = √( RCF ⁄ (1.118×10⁻⁵ × r) )　(r: cm)',work:`= √( ${fmt(v)} ⁄ (1.118×10⁻⁵ × ${fmt(r)} cm) ) = <b>${fmt(rpm,5)} rpm</b>`}}const g=k*r*v*v;return{results:[{label:'相対遠心力 RCF',value:'<b>'+fmt(g,5)+' ×g</b>',lead:true}],formula:'RCF = 1.118×10⁻⁵ × r(cm) × rpm²',work:`= 1.118×10⁻⁵ × ${fmt(r)} cm × ${fmt(v)}² = <b>${fmt(g,5)} ×g</b>`}}}];
function buildOD(){const root=toolShell('🧫','OD・培養・試薬添加','ブランク補正後の真のOD、到達/予測、培養への試薬添加量を計算。');$('.form',root).innerHTML=`<div class="subhead">① ブランク補正</div>${fieldHTML({key:'odm',label:'測定OD',placeholder:'例: 0.65'})}${fieldHTML({key:'bg',label:'バックグラウンド',def:'0',placeholder:'例: 0.04'})}<div class="subhead">② 培養時間</div>${fieldHTML({key:'td',label:'倍増期',unitSel:['min','h'],defUnit:'min',placeholder:'例: 25'})}${fieldHTML({key:'odt',label:'目的OD',placeholder:'例: 1.0'})}${fieldHTML({key:'el',label:'経過時間',unitSel:['min','h'],defUnit:'min'})}<div class="subhead">③ 試薬添加</div>${fieldHTML({key:'cv',label:'培養液量',unitSel:['mL','L','µL'],defUnit:'mL',placeholder:'例: 50'})}${fieldHTML({key:'cs',label:'ストック濃度',unitSel:['M','mM','µM','mg/mL'],defUnit:'mM',placeholder:'例: 1000'})}${fieldHTML({key:'cf',label:'目的最終濃度',unitSel:['M','mM','µM','mg/mL'],defUnit:'mM',placeholder:'例: 1'})}`;const form=$('.form',root),out=$('.out',root),cmix={M:1,mM:1e-3,'µM':1e-6,'mg/mL':1};const toMin=(v,u)=>{v=num(v);return isFinite(v)?(u==='h'?v*60:v):NaN},toMx=(v,u,map)=>{v=num(v);return isFinite(v)?v*(map[u]??1):NaN};const run=()=>{const d=gather(form),odm=num(d.odm),bg=num(d.bg)||0,td=toMin(d.td,d.td_u),odt=num(d.odt),el=toMin(d.el,d.el_u),res=[];let work='';const trueOD=isFinite(odm)?odm-bg:NaN;if(isFinite(trueOD)){res.push({label:'真のOD',value:'<b>'+fmt(trueOD)+'</b>',lead:true});work+=`真のOD = ${fmt(odm)} − ${fmt(bg)} = <b>${fmt(trueOD)}</b>`}if(trueOD>0&&td>0&&isFinite(odt)&&odt>trueOD){const t=td*Math.log2(odt/trueOD);res.push({label:'目的ODまでの時間',value:'<b>'+hm(t)+'</b>'});work+=`<br>t = ${fmt(td)}min × log₂(${fmt(odt)} ⁄ ${fmt(trueOD)}) = <b>${hm(t)}</b>`}if(trueOD>0&&td>0&&isFinite(el))res.push({label:'経過後の予測OD',value:fmt(trueOD*Math.pow(2,el/td))});const cs=toMx(d.cs,d.cs_u,cmix),cf=toMx(d.cf,d.cf_u,cmix),cv=tomL(d.cv,d.cv_u);if(cs>0&&cf>0&&cv>0&&cf<cs){const vadd=cf*cv/cs;res.push({label:'試薬の添加量',value:'<b>'+volStr(vadd)+'</b>'});work+=`<br>添加量 = ${fmt(cf)} ⁄ ${fmt(cs)} × ${volStr(cv)} = <b>${volStr(vadd)}</b>`}if(!res.length)return renderResults(out,null,'測定ODなどを入力すると結果が表示されます。');renderResults(out,{results:res,formula:'真のOD = 測定OD − BG　t = 倍増期 × log₂(目的OD ⁄ 真のOD)　添加量 = (最終 ⁄ ストック) × 容量',work,foot:'試薬添加は希釈による体積増加を無視した近似です。'})};form.querySelectorAll('input,select').forEach(el=>{el.addEventListener('input',run);el.addEventListener('change',run)});run();return root}
function buildRecipe(){const root=toolShell('⚗️','溶液調製レシピ','成分ごとにストック希釈/粉末秤量の必要量を一括算出。'),form=$('.form',root),out=$('.out',root);form.innerHTML=`${fieldHTML({key:'vf',label:'最終調製量',unitSel:['mL','L','µL'],defUnit:'mL',placeholder:'例: 50'})}<div class="subhead">成分</div><div class="rows" id="rrows"></div><button class="btn" id="radd">＋ 成分を追加</button>`;const rowsEl=$('#rrows',form),concU=['M','mM','µM','mg/mL','%(w/v)','×'];function rowHTML(){return`<div class="row" data-r style="grid-template-columns:1.3fr 1fr"><input data-f="name" placeholder="成分名"><select data-f="type"><option value="liq">液体ストック</option><option value="sol">固体粉末</option></select><div data-liq style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;grid-column:1/-1"><input data-f="cs" type="number" step="any" placeholder="ストック濃度"><input data-f="cfl" type="number" step="any" placeholder="最終濃度"><select data-f="ul">${concU.map(u=>`<option>${u}</option>`).join('')}</select></div><div data-sol style="display:none;grid-template-columns:1fr 1fr auto;gap:8px;grid-column:1/-1"><input data-f="mw" type="number" step="any" placeholder="分子量 g/mol"><input data-f="cfs" type="number" step="any" placeholder="最終濃度"><select data-f="us"><option>M</option><option selected>mM</option><option>µM</option></select></div><div style="grid-column:1/-1;display:flex;justify-content:space-between;align-items:center"><span class="amt" data-amt>—</span><button class="btn x" data-del>削除</button></div></div>`}function addRow(){const t=document.createElement('template');t.innerHTML=rowHTML().trim();const node=t.content.firstChild;rowsEl.appendChild(node);wireRow(node);run()}function wireRow(node){node.querySelector('[data-del]').onclick=()=>{node.remove();run()};node.querySelector('[data-f="type"]').onchange=e=>{const liq=e.target.value==='liq';node.querySelector('[data-liq]').style.display=liq?'grid':'none';node.querySelector('[data-sol]').style.display=liq?'none':'grid';run()};node.querySelectorAll('input,select').forEach(el=>{el.addEventListener('input',run);el.addEventListener('change',run)})}function run(){const d=gather(form),vfL=toL(d.vf,d.vf_u),vfmL=vfL*1000;let liqSum=0;const res=[];rowsEl.querySelectorAll('[data-r]').forEach(node=>{const g=f=>node.querySelector(`[data-f="${f}"]`),amt=node.querySelector('[data-amt]'),name=g('name').value.trim()||'(無名)',type=g('type').value;let txt='—';if(vfmL>0){if(type==='liq'){const cs=num(g('cs').value),cf=num(g('cfl').value);if(cs>0&&cf>0&&cf<=cs){const v=cf/cs*vfmL;liqSum+=v;txt=volStr(v);res.push({label:name,value:txt})}}else{const mw=num(g('mw').value),cf=toM(g('cfs').value,g('us').value);if(mw>0&&cf>0){const mass=mw*cf*vfL;txt=massStr(mass);res.push({label:name,value:txt})}}}amt.textContent=txt});if(!res.length)return renderResults(out,null,'最終調製量と成分を入力してください。');const solvent=vfmL-liqSum;res.push({label:'─ 加える溶媒',value:solvent>=0?volStr(solvent)+' まで':'⚠ 液量超過'});res.push({label:'最終調製量',value:volStr(vfmL)});renderResults(out,{results:res,formula:'液体: 添加量 = (最終 ⁄ ストック) × 最終容量　固体: 質量 = MW × 濃度(M) × 容量(L)',work:`合計液量 ${volStr(liqSum)} → 残りを溶媒で <b>${volStr(vfmL)}</b> までメスアップ`,foot:'液体成分はストックと最終濃度を同じ単位で入力してください。'})}$('#radd',form).onclick=addRow;addRow();addRow();return root}
function buildSerial(){const root=toolShell('🌀','連続希釈','初濃度・希釈率・段数から各管の濃度と分注量・希釈液量の表を作ります。'),form=$('.form',root),out=$('.out',root);form.innerHTML=`${fieldHTML({key:'c0',label:'初濃度 (Tube 0)',unitSel:['M','mM','µM','nM','mg/mL','×'],defUnit:'µM',placeholder:'例: 100'})}${fieldHTML({key:'fac',label:'希釈率',def:'10'})}${fieldHTML({key:'steps',label:'段数',def:'5'})}${fieldHTML({key:'vol',label:'各管の最終容量',unitSel:['mL','µL','L'],defUnit:'µL',placeholder:'例: 1000'})}`;const run=()=>{const d=gather(form),c0=num(d.c0),fac=num(d.fac),n=Math.min(30,Math.max(1,Math.round(num(d.steps)||0))),V=tomL(d.vol,d.vol_u),u=d.c0_u||'';if(!(c0>0&&fac>1&&V>0))return renderResults(out,null,'初濃度・希釈率(>1)・容量を入力してください。');const transfer=V/fac,diluent=V-transfer;let rows='<table class="dtable"><tr><th>管</th><th>濃度</th><th>前段から</th><th>希釈液</th></tr>';rows+=`<tr><td>0</td><td>${fmt(c0)} ${u}</td><td>原液</td><td>—</td></tr>`;for(let i=1;i<=n;i++)rows+=`<tr><td>${i}</td><td>${fmt(c0/Math.pow(fac,i))} ${u}</td><td>${volStr(transfer)}</td><td>${volStr(diluent)}</td></tr>`;rows+='</table>';$('.readout',out).innerHTML=rows;const note=$('.note',out);note.style.display='';note.innerHTML=`<div class="ey">✎ ノート用の式</div><div class="f-gen">Cₙ = C₀ ⁄ 希釈率ⁿ　移す量 = 容量 ⁄ 希釈率</div><div class="f-work">各管: 前段から <b>${volStr(transfer)}</b> ＋ 希釈液 <b>${volStr(diluent)}</b>（計 ${volStr(V)}）</div>`};form.querySelectorAll('input,select').forEach(el=>{el.addEventListener('input',run);el.addEventListener('change',run)});run();return root}
function buildErrProp(){const root=toolShell('±','誤差伝播','和・差・積・商における測定値の不確かさを合成します。'),form=$('.form',root),out=$('.out',root);let mode='sum';form.innerHTML=`<div class="seg"><button data-m="sum" class="on">和・差</button><button data-m="prod">積・商</button></div><div class="subhead">測定値 (値 ± 誤差)</div><div class="rows" id="erows"></div><button class="btn" id="eadd">＋ 項を追加</button>`;const rowsEl=$('#erows',form);function rowHTML(){return`<div class="row" data-r style="grid-template-columns:auto 1fr 1fr auto"><select data-f="op" style="min-width:54px">${mode==='sum'?'<option value="+">+</option><option value="-">−</option>':'<option value="*">×</option><option value="/">÷</option>'}</select><input data-f="x" type="number" step="any" placeholder="値"><input data-f="e" type="number" step="any" placeholder="± 誤差"><button class="btn x" data-del>削除</button></div>`}function addRow(){const t=document.createElement('template');t.innerHTML=rowHTML().trim();const node=t.content.firstChild;rowsEl.appendChild(node);wire(node);run()}function wire(node){node.querySelector('[data-del]').onclick=()=>{node.remove();run()};node.querySelectorAll('input,select').forEach(el=>{el.addEventListener('input',run);el.addEventListener('change',run)})}function refreshOps(){rowsEl.querySelectorAll('[data-r]').forEach(node=>node.querySelector('[data-f="op"]').innerHTML=mode==='sum'?'<option value="+">+</option><option value="-">−</option>':'<option value="*">×</option><option value="/">÷</option>')}function run(){const rows=[...rowsEl.querySelectorAll('[data-r]')].map(node=>({op:node.querySelector('[data-f="op"]').value,x:num(node.querySelector('[data-f="x"]').value),e:num(node.querySelector('[data-f="e"]').value)||0})).filter(r=>isFinite(r.x));if(!rows.length)return renderResults(out,null,'値と誤差を入力してください。');let f,sf,formula,work;if(mode==='sum'){f=rows.reduce((a,r)=>a+(r.op==='-'?-r.x:r.x),0);sf=Math.sqrt(rows.reduce((a,r)=>a+r.e*r.e,0));formula='σ = √( σ₁² + σ₂² + … )';work=`f = ${fmt(f)},　σ = √(${rows.map(r=>fmt(r.e)+'²').join(' + ')}) = <b>${fmt(sf)}</b>`}else{f=rows.reduce((a,r)=>a*(r.op==='/'?1/r.x:r.x),1);const rel=Math.sqrt(rows.reduce((a,r)=>a+(r.x!==0?(r.e/r.x)**2:0),0));sf=Math.abs(f)*rel;formula='(σ_f ⁄ f) = √( (σ₁ ⁄ x₁)² + … )';work=`f = ${fmt(f)},　相対誤差 = ${fmt(rel*100)} %,　σ = <b>${fmt(sf)}</b>`}renderResults(out,{results:[{label:'結果 f ± σ',value:'<b>'+pmStr(f,sf)+'</b>',lead:true},{label:'不確かさ σ',value:fmt(sf)}],formula,work,foot:'各測定値が独立で誤差が無相関であることを仮定しています。'})}form.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{mode=b.dataset.m;form.querySelectorAll('.seg button').forEach(x=>x.classList.toggle('on',x===b));refreshOps();run()});$('#eadd',form).onclick=addRow;addRow();addRow();return root}
const view=document.getElementById('view');document.getElementById('count').textContent=TOOLS.length+' tools';function renderHome(){view.innerHTML=`<div class="search"><span class="mag">⌕</span><input id="q" type="search" placeholder="計算機を検索 (例: 希釈 / OD / 標準偏差)" autocomplete="off"></div><div id="grid"></div>`;const grid=$('#grid',view),q=$('#q',view);function fill(filter){const f=(filter||'').trim().toLowerCase(),hit=TOOLS.filter(t=>!f||(t.name+t.blurb+t.cat).toLowerCase().includes(f));if(!hit.length){grid.innerHTML='<div class="empty">該当する計算機がありません。</div>';return}const cats=[...new Set(hit.map(t=>t.cat))];grid.innerHTML=cats.map(c=>`<div class="cat"><span class="lab">${c}</span><span class="rule"></span></div><div class="grid">${hit.filter(t=>t.cat===c).map(t=>`<a class="card" href="#${t.id}"><span class="ico">${t.icon}</span><h3>${t.name}</h3><p>${t.blurb}</p></a>`).join('')}</div>`).join('')}q.addEventListener('input',()=>fill(q.value));fill('')}
function route(){const id=decodeURIComponent(location.hash.replace(/^#\/?/,''));window.scrollTo(0,0);const tool=TOOLS.find(t=>t.id===id);if(tool){view.innerHTML='';view.appendChild(tool.custom?tool.custom():buildDeclTool(tool))}else renderHome()}window.addEventListener('hashchange',route);route();
</script>
